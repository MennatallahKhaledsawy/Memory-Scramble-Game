<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Scramble Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Memory Scramble</h1>
    
    <div id="config-panel">
        <!-- Row 1: input fields (label stacked above input) -->
        <div class="config-row config-row--fields">
            <div class="field">
                <label for="rows">Rows</label>
                <input type="number" id="rows" min="2" max="10" step="2">
            </div>
            <div class="field">
                <label for="cols">Columns</label>
                <input type="number" id="cols" min="2" max="10">
            </div>
            <div class="field">
                <label for="time">Timeout (s)</label>
                <input type="number" id="time" min="10" max="600" value="60">
            </div>
            <div class="field">
                <label for="category">Category</label>
                <select id="category">
                    <option value="food">Food</option>
                    <option value="animals">Animals</option>
                </select>
            </div>
            <!-- Difficulty preset dropdown - picking Easy / Medium / Hard
                 fills the rows/cols/time inputs and starts a new game.
                 Capped at 4x5 because each category ships 10 unique items.
                 field--full spans the entire grid row on mobile so the
                 odd 5th field doesn't sit alone in one column. -->
            <div class="field field--full">
                <label for="difficulty">Difficulty</label>
                <select id="difficulty">
                    <option value="">Custom</option>
                    <option value="easy"   data-rows="2" data-cols="2" data-time="30">Easy</option>
                    <option value="medium" data-rows="4" data-cols="4" data-time="60">Medium</option>
                    <option value="hard"   data-rows="4" data-cols="5" data-time="45">Hard</option>
                </select>
            </div>
        </div>

        <!-- Row 2: primary actions, Start centered as the focal button -->
        <div class="config-row config-row--actions">
            <button id="start-btn">Start Game</button>
            <button id="reset-btn" hidden>Reset</button>
        </div>

        <!-- Inline validation message shown in place of a blocking alert() -->
        <div id="error-message" role="alert"></div>
    </div>

    <div id="game-info">
        <h2>Time Left: <span id="timer-display">0</span></h2>
        <!-- Live counter of matched pairs out of the total for this game -->
        <p id="score-display">Matches: <span id="matches">0</span> / <span id="total">0</span></p>
        <h3 id="message-display"></h3>
    </div>

    <div id="game-board" class="board"></div>

    <script src="script.js"></script>
</body>
</html>
