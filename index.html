<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Scramble Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Memory Scramble</h1>
    
    <div id="config-panel">
        <label for="rows">Rows:</label>
        <input type="number" id="rows" min="2" max="10" step="2">

        <label for="cols">Columns:</label>
        <input type="number" id="cols" min="2" max="10">

        <label for="time">Timeout (seconds):</label>
        <input type="number" id="time" min="10" max="600" value="60">

        <button id="start-btn">Start Game</button>
        <button id="reset-btn" hidden>Reset</button>

        <!-- Quick difficulty presets - capped at 4x5 because we only ship
             10 unique images, which limits us to 10 pairs (20 cards). -->
        <div id="presets">
            <span>Presets:</span>
            <button type="button" data-rows="2" data-cols="2" data-time="30">Easy</button>
            <button type="button" data-rows="4" data-cols="4" data-time="60">Medium</button>
            <button type="button" data-rows="4" data-cols="5" data-time="45">Hard</button>
        </div>

        <!-- Inline validation message shown in place of a blocking alert() -->
        <div id="error-message" role="alert"></div>
    </div>

    <div id="game-info">
        <h2>Time Left: <span id="timer-display">0</span></h2>
        <!-- Live counter of matched pairs out of the total for this game -->
        <p id="score-display">Matches: <span id="matches">0</span> / <span id="total">0</span></p>
        <h3 id="message-display"></h3>
    </div>

    <div id="game-board" class="board"></div>

    <script src="script.js"></script>
</body>
</html>
